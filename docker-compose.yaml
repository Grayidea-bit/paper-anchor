services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: paper
      POSTGRES_PASSWORD: paper
      POSTGRES_DB: paper_reader
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paper -d paper_reader"]
      interval: 2s
      timeout: 3s
      retries: 15

  api:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://paper:paper@db:5432/paper_reader
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "python -m app.db.migrate && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  web:
    image: node:20-alpine
    working_dir: /app
    environment:
      API_PROXY_TARGET: http://api:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - web_node_modules:/app/node_modules
    depends_on:
      - api
    command: sh -c "npm install && npm run dev"

volumes:
  pgdata:
  uploads:
  web_node_modules:
